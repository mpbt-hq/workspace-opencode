sources:
    git:
        url:    https://github.com/oven-sh/bun.git
        ref:    refs/tags/bun-v1.3.14
        depth:  1
        fetch:
          - refs/tags/bun-v1.3.14:refs/tags/bun-v1.3.14

# bun >= ~1.3.x dropped cmake; the build is driven by scripts/build.ts, which
# configures (emits ninja directly) and runs ninja. Run it with the bun we
# bootstrapped (bun-bootstrap), so the real bun builds the normal way (codegen
# under real bun, no node/tsx shims).
buildsystem: exec
depends:
    - 3rdparty/bun-bootstrap

commands:
    build:
        - ${@PROJECT::@workdir}/build/3rdparty/bun-bootstrap/bun-debug
        - scripts/build.ts
        # Release, not debug: a debug+asan bun reports its version as
        # "1.3.14-debug", which downstream consumers (opencode's @opencode-ai/
        # script) reject via `semver.satisfies(version, "^1.3.14")` (prerelease
        # tags don't satisfy the range). Release reports a clean "1.3.14".
        - --profile=release
        # The build dir must live inside the source tree: bun's generated ninja
        # runs `zig build` from the build dir without -Dbuild-file, so zig finds
        # build.zig by searching parent dirs. An out-of-tree build dir breaks it.
        - --build-dir=${@PROJECT::@workdir}/sources/3rdparty/bun/build/release
    # Install the built bun into the prefix as `bun`, so later packages (opencode)
    # can build with it. The release build strips to `bun` (bun-profile is the
    # unstripped one). $DESTDIR is set by mpbt: empty for the live prefix install,
    # the per-package image dir for the binary tarball.
    install:
        - sh
        - -c
        - install -D -m755 build/release/bun "$DESTDIR${install-prefix}/bin/bun"
